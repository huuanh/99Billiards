services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_APP_USERNAME: ${MONGO_APP_USERNAME}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
      MONGO_APP_DATABASE: 99billiards
    volumes:
      - mongo-data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - internal

  web:
    build:
      context: .
      args:
        APP: web
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongo:27017/99billiards
    expose:
      - "3000"
    networks:
      - internal

  admin:
    build:
      context: .
      args:
        APP: admin
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_APP_USERNAME}:${MONGO_APP_PASSWORD}@mongo:27017/99billiards
    expose:
      - "3001"
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - admin
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/99billiards.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

volumes:
  mongo-data:

networks:
  internal:
    driver: bridge
